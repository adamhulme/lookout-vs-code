name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run vsix
      - uses: actions/upload-artifact@v4
        with:
          name: lookout-vsix
          path: "*.vsix"

  extension-host:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vscode: ["1.96.0", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
